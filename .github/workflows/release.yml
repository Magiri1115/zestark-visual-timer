name: 'publish'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: add Rust targets (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'Visual Timer v__VERSION__'
          releaseBody: 'Download and install the appropriate installer for your platform.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Prepare ZIP (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          # ZIP用の一時ディレクトリを作成
          New-Item -ItemType Directory -Force -Path release-zip

          # EXEファイルをコピー
          $exeFiles = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis\*.exe" -ErrorAction SilentlyContinue
          if ($exeFiles) {
            Copy-Item $exeFiles[0].FullName -Destination "release-zip\ZestarkTimer.exe"
          }

          # MSIファイルをコピー
          $msiFiles = Get-ChildItem -Path "src-tauri\target\release\bundle\msi\*.msi" -ErrorAction SilentlyContinue
          if ($msiFiles) {
            foreach ($msi in $msiFiles) {
              Copy-Item $msi.FullName -Destination "release-zip\"
            }
          }

          # README.txtをコピー（存在する場合）
          if (Test-Path "README.txt") {
            Copy-Item "README.txt" -Destination "release-zip\README.txt"
          }

      - name: Create ZIP
        if: matrix.platform == 'windows-latest'
        run: |
          Compress-Archive -Path release-zip\* -DestinationPath zestark-visual-timer.zip -Force

      - name: Upload ZIP to Release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ github.run_number }}
          files: zestark-visual-timer.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}