name: 'publish'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: add Rust targets (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'Visual Timer v__VERSION__'
          releaseBody: 'Download and install the appropriate installer for your platform.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Prepare ZIP (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |

          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          mkdir dist

          if (Test-Path src-tauri\target\release\bundle\nsis\*.exe) {
            copy src-tauri\target\release\bundle\nsis\*.exe dist\ZestarkTimer.exe
          }

          if (Test-Path src-tauri\target\release\bundle\msi\*.msi) {
            copy src-tauri\target\release\bundle\msi\*.msi dist\
          }

          if (Test-Path README.txt) {
            copy README.txt dist\README.txt
          }

      - name: Create ZIP
        if: matrix.platform == 'windows-latest'
        run: powershell Compress-Archive -Path dist\* -DestinationPath zestark-visual-timer.zip

      - name: Upload ZIP to Release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: zestark-visual-timer.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}