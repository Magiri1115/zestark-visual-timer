<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">

  <!-- 外枠 -->
  <circle cx="50" cy="55" r="35" fill="blue"/>

  <!-- 文字盤 -->
  <circle cx="50" cy="55" r="25" fill="white"/>

  <!-- プログレスバー背景 -->
  <circle cx="50" cy="55" r="30"
          fill="none"
          stroke="lightblue"
          stroke-width="4"/>

  <!-- プログレスバー -->
  <circle cx="50" cy="55" r="30"
          fill="none"
          stroke="blue"
          stroke-width="4"
          stroke-dasharray="188"
          stroke-dashoffset="188"
          transform="rotate(-90 50 55)">

    <animate
      attributeName="stroke-dashoffset"
      from="188"
      to="0"
      dur="10s"
      repeatCount="indefinite"/>
  </circle>

  <!-- ストップウォッチ上部 -->
  <rect x="45" y="5" width="10" height="10" fill="blue"/>
  <rect x="40" y="15" width="20" height="8" fill="blue"/>

  <!-- 中心 -->
  <circle cx="50" cy="55" r="3" fill="blue"/>

  <!-- 針 -->
  <line x1="50" y1="55" x2="50" y2="35"
        stroke="blue"
        stroke-width="2">

    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 50 55"
      to="360 50 55"
      dur="10s"
      repeatCount="indefinite"/>
  </line>

</svg>