<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>状態遷移図 — ビジュアルバータイマーアプリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    padding: 48px 32px;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .doc-meta { font-size: 13px; color: #888; margin-bottom: 48px; }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: #999; margin-bottom: 16px;
  }
  svg { display: block; width: 100%; }

  /* state nodes */
  .state-box { fill: #fff; stroke: #c8c6c0; stroke-width: 1; }
  .state-box.active { fill: #eef4fe; stroke: #4a86d8; }
  .state-box.alarm  { fill: #fef0ee; stroke: #d8604a; }
  .state-box.end    { fill: #f0f9f5; stroke: #3baa75; }
  .state-label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
  .state-label.active { fill: #1a4fa0; }
  .state-label.alarm  { fill: #9a2a14; }
  .state-label.end    { fill: #0a5e38; }
  .state-sub { font-size: 11px; fill: #888; }

  /* arrows */
  .arr { fill: none; stroke: #888; stroke-width: 1.2; }
  .arr-label { font-size: 11px; fill: #666; }

  /* transition table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 40px; }
  th {
    text-align: left; font-weight: 600; font-size: 11px; color: #888;
    padding: 8px 12px; border-bottom: 1px solid #e0e0e0; background: #f9f9f7;
  }
  td { padding: 9px 12px; border-bottom: 1px solid #eee; color: #333; line-height: 1.5; }
  tr:last-child td { border-bottom: none; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
  }
  .b-gray   { background: #f0efe8; color: #5f5e5a; }
  .b-blue   { background: #e6f1fb; color: #185fa5; }
  .b-green  { background: #eaf3de; color: #3b6d11; }
  .b-red    { background: #fcebeb; color: #a32d2d; }
  .b-amber  { background: #faeeda; color: #854f0b; }
</style>
</head>
<body>

<h1>状態遷移図</h1>
<p class="doc-meta">ビジュアルバータイマーアプリ &nbsp;|&nbsp; タイマー状態</p>

<p class="section-label">状態遷移フロー</p>

<svg viewBox="0 0 720 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4a86d8" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#d8604a" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== NODES ===== -->

  <!-- 未開始 (top center) -->
  <rect class="state-box" x="280" y="30" width="160" height="56" rx="10"/>
  <text class="state-label" x="360" y="58" text-anchor="middle" dominant-baseline="central">未開始</text>
  <text class="state-sub"   x="360" y="76" text-anchor="middle">初期 / リセット後</text>

  <!-- 設定済み -->
  <rect class="state-box active" x="280" y="150" width="160" height="56" rx="10"/>
  <text class="state-label active" x="360" y="178" text-anchor="middle" dominant-baseline="central">設定済み</text>
  <text class="state-sub"         x="360" y="196" text-anchor="middle">時間が選択された状態</text>

  <!-- 実行中 -->
  <rect class="state-box active" x="280" y="280" width="160" height="56" rx="10"/>
  <text class="state-label active" x="360" y="308" text-anchor="middle" dominant-baseline="central">実行中</text>
  <text class="state-sub"         x="360" y="326" text-anchor="middle">カウントダウン中</text>

  <!-- 一時停止中 -->
  <rect class="state-box" x="520" y="280" width="160" height="56" rx="10"/>
  <text class="state-label" x="600" y="308" text-anchor="middle" dominant-baseline="central">一時停止中</text>
  <text class="state-sub"   x="600" y="326" text-anchor="middle">停止ボタン押下後</text>

  <!-- 終了 -->
  <rect class="state-box end" x="280" y="410" width="160" height="56" rx="10"/>
  <text class="state-label end" x="360" y="438" text-anchor="middle" dominant-baseline="central">終了</text>
  <text class="state-sub"       x="360" y="456" text-anchor="middle">00分00秒 に到達</text>

  <!-- アラーム中 -->
  <rect class="state-box alarm" x="40" y="410" width="160" height="56" rx="10"/>
  <text class="state-label alarm" x="120" y="438" text-anchor="middle" dominant-baseline="central">アラーム中</text>
  <text class="state-sub"         x="120" y="456" text-anchor="middle">通知・アラーム音再生</text>

  <!-- ===== ARROWS ===== -->

  <!-- 未開始 → 設定済み -->
  <line class="arr" x1="360" y1="86" x2="360" y2="148" marker-end="url(#arr)"/>
  <text class="arr-label" x="368" y="120">時間を設定する</text>

  <!-- 設定済み → 実行中 -->
  <line class="arr" x1="360" y1="206" x2="360" y2="278" marker-end="url(#arr)"/>
  <text class="arr-label" x="368" y="245">開始ボタン</text>

  <!-- 実行中 → 一時停止中 -->
  <line class="arr" x1="440" y1="300" x2="518" y2="300" marker-end="url(#arr)"/>
  <text class="arr-label" x="458" y="292">停止ボタン</text>

  <!-- 一時停止中 → 実行中 (return) -->
  <path class="arr" d="M520 318 L440 318" marker-end="url(#arr)"/>
  <text class="arr-label" x="458" y="332">再開ボタン</text>

  <!-- 実行中 → 終了 -->
  <line class="arr" x1="360" y1="336" x2="360" y2="408" marker-end="url(#arr)"/>
  <text class="arr-label" x="368" y="374">00分00秒</text>

  <!-- 終了 → アラーム中 -->
  <line class="arr" x1="278" y1="438" x2="202" y2="438" marker-end="url(#arr-r)" stroke="#d8604a" stroke-width="1.2"/>
  <text class="arr-label" x="214" y="430" fill="#d8604a">アラーム発生</text>

  <!-- アラーム中 → 未開始 (curved left side) -->
  <path class="arr" d="M40 430 Q10 430 10 310 Q10 86 278 58"
    marker-end="url(#arr)" stroke-dasharray="5 3" opacity="0.6"/>
  <text class="arr-label" x="14" y="300" text-anchor="start">アラーム停止</text>

  <!-- 実行中 → 未開始 (reset, right side detour) -->
  <path class="arr" d="M440 285 Q480 240 480 160 Q480 70 442 58"
    marker-end="url(#arr)" stroke-dasharray="5 3" opacity="0.5"/>
  <text class="arr-label" x="484" y="190" text-anchor="start">リセット</text>

  <!-- 一時停止中 → 未開始 (reset) -->
  <path class="arr" d="M600 280 Q660 200 660 100 Q660 52 442 48"
    marker-end="url(#arr)" stroke-dasharray="5 3" opacity="0.5"/>
  <text class="arr-label" x="646" y="175" text-anchor="start">リセット</text>

  <!-- LEGEND -->
  <line x1="40" y1="515" x2="70" y2="515" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text class="arr-label" x="76" y="519">通常遷移（操作）</text>
  <line x1="200" y1="515" x2="230" y2="515" stroke="#888" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)" opacity="0.6"/>
  <text class="arr-label" x="236" y="519">リセット / 終了後の戻り</text>
  <rect x="395" y="506" width="12" height="12" rx="2" fill="#eef4fe" stroke="#4a86d8" stroke-width="1"/>
  <text class="arr-label" x="412" y="518">実行系状態</text>
  <rect x="490" y="506" width="12" height="12" rx="2" fill="#fef0ee" stroke="#d8604a" stroke-width="1"/>
  <text class="arr-label" x="507" y="518">アラーム状態</text>
</svg>

<!-- Transition table -->
<p class="section-label" style="margin-top:48px;">遷移一覧</p>

<table>
  <thead>
    <tr>
      <th>現在の状態</th>
      <th>操作 / イベント</th>
      <th>遷移先</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td><span class="badge b-gray">未開始</span></td>
      <td>時間を設定する</td>
      <td><span class="badge b-blue">設定済み</span></td>
    </tr>
    <tr>
      <td><span class="badge b-blue">設定済み</span></td>
      <td>開始ボタンを押す</td>
      <td><span class="badge b-blue">実行中</span></td>
    </tr>
    <tr>
      <td><span class="badge b-blue">実行中</span></td>
      <td>停止ボタンを押す</td>
      <td><span class="badge b-gray">一時停止中</span></td>
    </tr>
    <tr>
      <td><span class="badge b-gray">一時停止中</span></td>
      <td>再開ボタンを押す</td>
      <td><span class="badge b-blue">実行中</span></td>
    </tr>
    <tr>
      <td><span class="badge b-blue">実行中</span></td>
      <td>残り時間が 00分00秒 になる</td>
      <td><span class="badge b-green">終了</span> → <span class="badge b-red">アラーム中</span></td>
    </tr>
    <tr>
      <td><span class="badge b-blue">実行中</span></td>
      <td>リセットボタンを押す</td>
      <td><span class="badge b-gray">未開始</span></td>
    </tr>
    <tr>
      <td><span class="badge b-gray">一時停止中</span></td>
      <td>リセットボタンを押す</td>
      <td><span class="badge b-gray">未開始</span></td>
    </tr>
    <tr>
      <td><span class="badge b-red">アラーム中</span></td>
      <td>アラーム停止ボタンを押す</td>
      <td><span class="badge b-gray">未開始</span></td>
    </tr>
  </tbody>
</table>

</body>
</html>
